quarkus.application.name=mainfrankenit-backend
quarkus.http.port=${HTTP_PORT:8080}
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:mainfrankenit}
quarkus.datasource.password=${DB_PASSWORD:mainfrankenit}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/mainfrankenit}
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
%dev.quarkus.flyway.locations=db/migration,db/dev
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true
quarkus.smallrye-openapi.path=/api/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/docs
event.import.enabled=true
event.import.run-at-start=true
event.import.interval=30m
app.public-url=${APP_PUBLIC_URL:http://localhost:3000}
whatsapp.provider=${WHATSAPP_PROVIDER:mock}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}
%test.event.import.enabled=false
%test.event.import.run-at-start=false
%test.whatsapp.provider=mock
%docker.quarkus.http.port=8080
%docker.quarkus.datasource.jdbc.url=jdbc:postgresql://db:5432/${POSTGRES_DB:mainfrankenit}
%docker.quarkus.datasource.username=${POSTGRES_USER:mainfrankenit}
%docker.quarkus.datasource.password=${POSTGRES_PASSWORD:mainfrankenit}
