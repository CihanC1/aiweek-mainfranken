services:
  db:
    image: postgres:17-alpine
    networks: [app]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mainfrankenit}
      POSTGRES_USER: ${POSTGRES_USER:-mainfrankenit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mainfrankenit}
    ports: ["5433:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 15
  backend:
    build: .
    networks: [app]
    env_file:
      - .env
    depends_on:
      db: { condition: service_healthy }
    volumes:
      - ./event-sources.csv:/work/event-sources.csv:ro
      - ./manual-events.csv:/work/manual-events.csv:ro
    environment:
      QUARKUS_PROFILE: docker
      POSTGRES_DB: ${POSTGRES_DB:-mainfrankenit}
      POSTGRES_USER: ${POSTGRES_USER:-mainfrankenit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mainfrankenit}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      EVENT_SOURCES_FILE: ${EVENT_SOURCES_FILE:-event-sources.csv}
      EVENT_IMPORT_ENABLED: ${EVENT_IMPORT_ENABLED:-true}
      EVENT_IMPORT_RUN_AT_START: ${EVENT_IMPORT_RUN_AT_START:-true}
      EVENT_IMPORT_INTERVAL: ${EVENT_IMPORT_INTERVAL:-30m}
      EVENT_SOURCES_RELOAD_INTERVAL: ${EVENT_SOURCES_RELOAD_INTERVAL:-15s}
      EVENT_MANUAL_ENABLED: ${EVENT_MANUAL_ENABLED:-true}
      EVENT_MANUAL_FILE: ${EVENT_MANUAL_FILE:-manual-events.csv}
      EVENT_MANUAL_NOTIFY: ${EVENT_MANUAL_NOTIFY:-true}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
    ports: ["${API_PORT:-8082}:8080"]
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL-}
    networks: [app]
    depends_on: [backend]
    ports: ["3000:80"]
networks:
  app:
    name: mainfranken_default
volumes:
  postgres_data:
